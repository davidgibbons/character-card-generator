services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: character-generator
    restart: unless-stopped
    ports:
      - "${PORT:-2426}:2426"
    environment:
      - NODE_ENV=production
      - PORT=2426
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Character Generator}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-cards@character-generator.local}
      - DATA_DIR=${DATA_DIR:-/data}
    volumes:
      # Persistent storage for cards, prompts, and git history
      - cards-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2426/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  cards-data:
    name: character-generator-data
